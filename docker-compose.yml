services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-dev-only-secret-key-1234567890
      - DATABASE_URL=postgres://rojgari_user:rojgari_password@db:5432/rojgari_db
      - CACHE_URL=redis://valkey:6379/1
      - ALLOWED_HOSTS=localhost,127.0.0.1,web,0.0.0.0,web.rojgari.orb.local
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: rojgari_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=rojgari_db
      - POSTGRES_USER=rojgari_user
      - POSTGRES_PASSWORD=rojgari_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rojgari_user -d rojgari_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: rojgari_valkey
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
